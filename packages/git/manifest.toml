files = [".config/git/config", ".config/git/ignore", ".config/git/attributes", ".config/git/message", ".config/git/delta"]

name = "Git"
description = "Git configuration and aliases"
method = "stow"
target = "~"

[validation]
".config/git/config" = { command = "git", args = [
  "config",
  "--file",
  "FILE",
  "--list",
] }

[update]
command = "dev/update-gitignore"
args = [".gitignore-globals"]
