name: CI
permissions:
  contents: read

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v30

      - name: Lint (shellcheck + fish + markdownlint + nixfmt + statix + deadnix)
        run: nix develop -c make check

      - name: Secret scan (gitleaks)
        run: nix develop -c gitleaks git --verbose

      - name: Build Home Manager configs (Linux only — CI is x86_64-linux)
        run: |
          nix build .#homeConfigurations.personal.activationPackage --no-link
          nix build .#homeConfigurations.odin.activationPackage --no-link

      - name: Build NixOS configs
        run: |
          nix build .#nixosConfigurations.odin.config.system.build.toplevel --no-link --accept-flake-config
